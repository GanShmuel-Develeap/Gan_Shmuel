services:
  db:
    image: mysql:8.0
    container_name: weight-db
    restart: always
    environment:
      MYSQL_DATABASE: weight_db
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./weightdb.sql:/docker-entrypoint-initdb.d/weightdb.sql

  app:
    build: .
    container_name: weight-app
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=weight_db
    depends_on:
      - db

volumes:
  db_data: