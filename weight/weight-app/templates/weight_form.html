<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight Transaction Form</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Weight Transaction</h1>

        <form id="weightForm" action="/weight-form" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label for="direction">Direction *</label>
                    <select id="direction" name="direction" required>
                        <option value="">Select Direction</option>
                        <option value="in">In</option>
                        <option value="out">Out</option>
                        <option value="none">None</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="truck">Truck ID *</label>
                    <input type="text" id="truck" name="truck" placeholder="e.g., TR-001" required>
                </div>
            </div>

            <div class="form-group full">
                <label for="containers">Containers (comma-separated) <span id="containersReq">*</span></label>
                <input type="text" id="containers" name="containers" placeholder="e.g., C-001, C-002, C-003" required>
            </div>

            <div class="form-group full">
                <label for="produce">Produce Type</label>
                <input type="text" id="produce" name="produce" placeholder="e.g., Tomatoes, Cucumbers">
            </div>

            <div class="form-group full">
                <label for="bruto">Weight *</label>
                <input type="number" id="bruto" name="bruto" placeholder="Enter weight" required>
            </div>

            <button type="submit">Submit Transaction</button>

            <div id="responseMessage"></div>

            <div class="loading" id="loadingIndicator">
                <div class="spinner"></div>
                <p>Processing transaction...</p>
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('weightForm');
        const directionSelect = document.getElementById('direction');
        const containersInput = document.getElementById('containers');
        const containersReq = document.getElementById('containersReq');
        const responseMessage = document.getElementById('responseMessage');
        const loadingIndicator = document.getElementById('loadingIndicator');

        // Update containers requirement based on direction
        directionSelect.addEventListener('change', updateContainersRequirement);

        function updateContainersRequirement() {
            const direction = directionSelect.value;
            if (direction === 'out') {
                containersInput.removeAttribute('required');
                containersReq.style.display = 'none';
            } else if (direction === 'in' || direction === 'none') {
                containersInput.setAttribute('required', 'required');
                containersReq.style.display = 'inline';
            }
        }

        // Form submission
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Validate form
            if (!form.checkValidity()) {
                showMessage('Please fill in all required fields', 'error');
                return;
            }

            // Show loading indicator
            loadingIndicator.classList.add('show');
            responseMessage.style.display = 'none';

            try {
                const formData = new FormData(form);

                const response = await fetch('/weight-form', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(`Success! Transaction ID: ${data.id}. ${data.message}`, 'success');
                    // Reset form
                    form.reset();
                    updateContainersRequirement();
                
                } else {
                    showMessage(`Error: ${data.message}`, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage(`Network error: ${error.message}`, 'error');
            } finally {
                loadingIndicator.classList.remove('show');
            }
        });

        function showMessage(message, type) {
            responseMessage.textContent = message;
            responseMessage.className = type;
            responseMessage.style.display = 'block';
        }
    </script>
</body>
</html>
