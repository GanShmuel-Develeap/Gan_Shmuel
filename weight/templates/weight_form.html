<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight Transaction Form</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Weight Transaction</h1>

        <form id="weightForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="direction">Direction *</label>
                    <select id="direction" name="direction" required>
                        <option value="">Select Direction</option>
                        <option value="in">In</option>
                        <option value="out">Out</option>
                        <option value="none">None</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="truck">Truck ID *</label>
                    <input type="text" id="truck" name="truck" placeholder="e.g., TR-001" required>
                </div>
            </div>

            <div class="form-group full">
                <label for="containers">Containers (comma-separated) *</label>
                <input type="text" id="containers" name="containers" placeholder="e.g., C-001, C-002, C-003" required>
            </div>

            <div class="form-group full">
                <label for="produce">Produce Type</label>
                <input type="text" id="produce" name="produce" placeholder="e.g., Tomatoes, Cucumbers">
            </div>

            <div class="form-group full">
                <label for="bruto">Gross Weight (kg) *</label>
                <input type="number" id="bruto" name="bruto" placeholder="Enter gross weight" required>
            </div>

            <div class="form-row readonly">
                <div class="form-group">
                    <label for="truckTara">Truck Tara (kg)</label>
                    <input type="number" id="truckTara" readonly>
                </div>

                <div class="form-group">
                    <label for="neto">Net Weight (kg)</label>
                    <input type="number" id="neto" readonly>
                </div>
            </div>

            <button type="submit">Submit Transaction</button>

            <div id="responseMessage"></div>

            <div class="loading" id="loadingIndicator">
                <div class="spinner"></div>
                <p>Processing transaction...</p>
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('weightForm');
        const brutalInput = document.getElementById('bruto');
        const trucIDInput = document.getElementById('truck');
        const truckTaraInput = document.getElementById('truckTara');
        const netoInput = document.getElementById('neto');
        const responseMessage = document.getElementById('responseMessage');
        const loadingIndicator = document.getElementById('loadingIndicator');

        // Fetch truck tara from server when truck ID changes
        trucIDInput.addEventListener('change', async function() {
            const truckId = this.value.trim();
            if (truckId) {
                try {
                    const resp = await fetch(`/truck-tara/${encodeURIComponent(truckId)}`);
                    if (resp.ok) {
                        const data = await resp.json();
                        truckTaraInput.value = data.tara || '';
                    } else {
                        truckTaraInput.value = '';
                    }
                } catch (e) {
                    console.error('Error fetching tara:', e);
                    truckTaraInput.value = '';
                }
                calculateNeto();
            }
        });

        // Recalculate neto when bruto or truck tara changes
        brutalInput.addEventListener('input', calculateNeto);
        truckTaraInput.addEventListener('input', calculateNeto);

        function calculateNeto() {
            const bruto = parseInt(brutalInput.value) || 0;
            const truckTara = parseInt(truckTaraInput.value) || 0;
            const neto = bruto - truckTara;
            netoInput.value = neto >= 0 ? neto : 0;
        }

        // Form submission
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Validate form
            if (!form.checkValidity()) {
                showMessage('Please fill in all required fields', 'error');
                return;
            }

            // Show loading indicator
            loadingIndicator.classList.add('show');
            responseMessage.style.display = 'none';

            try {
                const formData = new FormData(form);

                const response = await fetch('/weight', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(`Success! Transaction ID: ${data.transaction_id}. ${data.message}`, 'success');
                    // Reset form
                    form.reset();
                    truckTaraInput.value = '';
                    netoInput.value = '';
                } else {
                    showMessage(`Error: ${data.message}`, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage(`Network error: ${error.message}`, 'error');
            } finally {
                loadingIndicator.classList.remove('show');
            }
        });

        function showMessage(message, type) {
            responseMessage.textContent = message;
            responseMessage.className = type;
            responseMessage.style.display = 'block';
        }
    </script>
</body>
</html>
