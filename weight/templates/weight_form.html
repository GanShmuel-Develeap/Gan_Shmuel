<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight Transaction Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        select,
        input[type="number"]:read-only {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="number"]:read-only {
            background-color: #f5f5f5;
            color: #666;
            cursor: not-allowed;
            border-color: #ddd;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 20px;
            padding-right: 40px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .form-row.readonly {
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #e0e0e0;
        }

        .form-row.readonly .form-group {
            margin-bottom: 15px;
        }

        .form-row.readonly .form-group:last-child {
            margin-bottom: 0;
        }

        #responseMessage {
            display: none;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 14px;
        }

        #responseMessage.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        #responseMessage.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Weight Transaction</h1>

        <form id="weightForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="direction">Direction *</label>
                    <select id="direction" name="direction" required>
                        <option value="">Select Direction</option>
                        <option value="in">In</option>
                        <option value="out">Out</option>
                        <option value="none">None</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="truck">Truck ID *</label>
                    <input type="text" id="truck" name="truck" placeholder="e.g., TR-001" required>
                </div>
            </div>

            <div class="form-group full">
                <label for="containers">Containers (comma-separated) *</label>
                <input type="text" id="containers" name="containers" placeholder="e.g., C-001, C-002, C-003" required>
            </div>

            <div class="form-group full">
                <label for="produce">Produce Type</label>
                <input type="text" id="produce" name="produce" placeholder="e.g., Tomatoes, Cucumbers">
            </div>

            <div class="form-group full">
                <label for="bruto">Gross Weight (kg) *</label>
                <input type="number" id="bruto" name="bruto" placeholder="Enter gross weight" required>
            </div>

            <div class="form-row readonly">
                <div class="form-group">
                    <label for="truckTara">Truck Tara (kg)</label>
                    <input type="number" id="truckTara" readonly>
                </div>

                <div class="form-group">
                    <label for="neto">Net Weight (kg)</label>
                    <input type="number" id="neto" readonly>
                </div>
            </div>

            <button type="submit">Submit Transaction</button>

            <div id="responseMessage"></div>

            <div class="loading" id="loadingIndicator">
                <div class="spinner"></div>
                <p>Processing transaction...</p>
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('weightForm');
        const brutalInput = document.getElementById('bruto');
        const trucIDInput = document.getElementById('truck');
        const truckTaraInput = document.getElementById('truckTara');
        const netoInput = document.getElementById('neto');
        const responseMessage = document.getElementById('responseMessage');
        const loadingIndicator = document.getElementById('loadingIndicator');

        // Calculate or fetch truck tara when truck ID changes
        trucIDInput.addEventListener('change', function() {
            const truckId = this.value.trim();
            if (truckId) {
                // In a real scenario, you might fetch this from the server
                // For now, we'll leave it as a manual lookup or auto-calculate
                console.log('Truck ID changed:', truckId);
                calculateNeto();
            }
        });

        // Recalculate neto when bruto or truck tara changes
        brutalInput.addEventListener('input', calculateNeto);
        truckTaraInput.addEventListener('input', calculateNeto);

        function calculateNeto() {
            const bruto = parseInt(brutalInput.value) || 0;
            const truckTara = parseInt(truckTaraInput.value) || 0;
            const neto = bruto - truckTara;
            netoInput.value = neto >= 0 ? neto : 0;
        }

        // Form submission
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Validate form
            if (!form.checkValidity()) {
                showMessage('Please fill in all required fields', 'error');
                return;
            }

            // Show loading indicator
            loadingIndicator.classList.add('show');
            responseMessage.style.display = 'none';

            try {
                const formData = new FormData(form);

                const response = await fetch('/weight', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(`Success! Transaction ID: ${data.transaction_id}. ${data.message}`, 'success');
                    // Reset form
                    form.reset();
                    truckTaraInput.value = '';
                    netoInput.value = '';
                } else {
                    showMessage(`Error: ${data.message}`, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage(`Network error: ${error.message}`, 'error');
            } finally {
                loadingIndicator.classList.remove('show');
            }
        });

        function showMessage(message, type) {
            responseMessage.textContent = message;
            responseMessage.className = type;
            responseMessage.style.display = 'block';
        }
    </script>
</body>
</html>
